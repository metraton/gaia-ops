<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaia-Ops Architecture Viewer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
    background: #1a1b26;
    color: #a9b1d6;
    padding: 20px;
    line-height: 1.5;
  }
  h1 {
    color: #7aa2f7;
    font-size: 1.4em;
    margin-bottom: 4px;
  }
  .version {
    color: #565f89;
    font-size: 0.85em;
    margin-bottom: 16px;
  }
  #search {
    width: 100%;
    max-width: 600px;
    padding: 8px 12px;
    margin-bottom: 16px;
    background: #24283b;
    border: 1px solid #414868;
    color: #c0caf5;
    font-family: inherit;
    font-size: 0.9em;
    border-radius: 4px;
    outline: none;
  }
  #search:focus { border-color: #7aa2f7; }
  #search::placeholder { color: #565f89; }
  .tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 16px;
  }
  .tab {
    padding: 6px 14px;
    background: #24283b;
    color: #565f89;
    border: 1px solid #414868;
    border-bottom: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.85em;
    border-radius: 4px 4px 0 0;
  }
  .tab.active { background: #1a1b26; color: #7aa2f7; border-color: #7aa2f7; }
  .panel { display: none; }
  .panel.active { display: block; }

  .tree { list-style: none; padding-left: 0; }
  .tree ul { list-style: none; padding-left: 20px; display: none; }
  .tree ul.open { display: block; }
  .tree li { margin: 2px 0; }

  .node {
    cursor: pointer;
    padding: 3px 8px;
    border-radius: 3px;
    display: inline-block;
    max-width: 100%;
  }
  .node:hover { background: #24283b; }
  .node .arrow {
    display: inline-block;
    width: 14px;
    text-align: center;
    color: #565f89;
    font-size: 0.8em;
    transition: transform 0.15s;
  }
  .node .arrow.open { transform: rotate(90deg); }
  .node.leaf .arrow { visibility: hidden; }

  .hook { color: #7aa2f7; font-weight: bold; }
  .adapter { color: #9ece6a; }
  .module { color: #ff9e64; }
  .type { color: #565f89; }
  .func { color: #bb9af7; }
  .status { font-size: 0.75em; padding: 1px 6px; border-radius: 3px; margin-left: 6px; }
  .status-fully_decoupled { background: #1a3a2a; color: #9ece6a; }
  .status-partial { background: #3a2a1a; color: #ff9e64; }
  .status-mvp { background: #2a2a3a; color: #7aa2f7; }

  .detail-panel {
    position: fixed;
    right: 0;
    top: 0;
    width: 380px;
    height: 100vh;
    background: #24283b;
    border-left: 1px solid #414868;
    padding: 16px;
    overflow-y: auto;
    display: none;
    z-index: 10;
  }
  .detail-panel.open { display: block; }
  .detail-panel h3 { color: #ff9e64; font-size: 1em; margin-bottom: 8px; }
  .detail-panel .close {
    position: absolute;
    top: 10px;
    right: 14px;
    cursor: pointer;
    color: #565f89;
    font-size: 1.2em;
  }
  .detail-panel .close:hover { color: #f7768e; }
  .detail-panel p { font-size: 0.85em; margin-bottom: 8px; }
  .detail-panel ul { padding-left: 16px; font-size: 0.82em; }
  .detail-panel li { margin: 2px 0; }
  .detail-panel .label { color: #565f89; font-size: 0.78em; text-transform: uppercase; margin-top: 10px; margin-bottom: 4px; }

  .highlight { background: #3d4059; border-radius: 2px; }
  .hidden { display: none !important; }

  .count { color: #565f89; font-size: 0.8em; margin-left: 4px; }
</style>
</head>

<h1>Gaia-Ops Hook-Adapter Architecture</h1>

  <div class="tab" data-panel="types-panel">Data Types</div>

<div id="hooks-panel" class="panel active">

</div>
<div id="types-panel" class="panel">

</div>

<div class="detail-panel" id="detail">
  <span class="close" id="detail-close">x</span>
  <div id="detail-content"></div>
</div>

      "functions": ["write", "get_session_events"],
      "aliases": ["capture_episodic_memory"],
      "description": "Episodic memory capture: stores workflow episodes with metrics, session events, anomalies via EpisodicMemory.store_episode()",
      "called_by": ["adapters/claude_code.py:adapt_subagent_stop"]
    },
    "modules/scanning/scan_trigger.py": {
      "functions": ["trigger_lightweight_scan"],
      "description": "Runs lightweight project scan via gaia-scan.py CLI subprocess (<3s target, 10s timeout)",
      "called_by": ["hooks/session_start.py"]
    },
    "modules/validation/commit_validator.py": {
      "class": "CommitMessageValidator",
      "public_methods": ["validate", "get_examples", "get_allowed_types", "format_error_message"],
      "private_methods": ["_load_config", "_check_forbidden_footers", "_check_conventional_format", "_check_subject_rules", "_check_body_rules", "_log_violation"],
      "convenience_functions": ["validate_commit_message", "safe_validate_before_commit"],
      "description": "Git commit message validation against project standards (forbidden footers, conventional commits format, subject/body rules)",
      "called_by": ["modules/tools/bash_validator.py"]
    }
  },
  "shared_infrastructure": {
    "adapters/utils.py": {
      "functions": ["warn_if_dual_channel"],
      "re_exports": ["has_stdin_data"],
      "description": "Shared utility functions: dual-channel warning, stdin re-export for backward compatibility"
    }
  }
};

arch = data;
document.getElementById('version').textContent =
  `v${data.version} -- generated ${data.generated}`;
renderHooks(data.hooks);
renderModules(data.modules);
renderTypes(data.data_types);

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.panel).classList.add('active');
  });
});

// Search
document.getElementById('search').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  document.querySelectorAll('.tree li').forEach(li => {
    if (!q) {
      li.classList.remove('hidden');
      li.querySelectorAll('.highlight').forEach(h => {
        h.outerHTML = h.innerHTML;
      });
      return;
    }
    const text = li.textContent.toLowerCase();
    if (text.includes(q)) {
      li.classList.remove('hidden');
      // Open parent uls
      let parent = li.parentElement;
      while (parent && parent.classList.contains('tree') === false) {
        if (parent.tagName === 'UL') parent.classList.add('open');
        if (parent.tagName === 'LI') parent.classList.remove('hidden');
        parent = parent.parentElement;
      }
    } else {
      li.classList.add('hidden');
    }
  });
});

function makeNode(text, cls, hasChildren, extraHtml) {
  const li = document.createElement('li');
  const span = document.createElement('span');
  span.className = 'node' + (hasChildren ? '' : ' leaf');
  const arrow = `<span class="arrow">${hasChildren ? '\u25B6' : ''}</span> `;
  span.innerHTML = arrow + `<span class="${cls}">${esc(text)}</span>` + (extraHtml || '');
  li.appendChild(span);
  if (hasChildren) {
    span.addEventListener('click', (e) => {
      e.stopPropagation();
      const ul = li.querySelector(':scope > ul');
      if (ul) {
        ul.classList.toggle('open');
        span.querySelector('.arrow').classList.toggle('open');
      }
    });
  }
  return li;
}

function addChildren(parentLi, items) {
  const ul = document.createElement('ul');
  items.forEach(item => ul.appendChild(item));
  parentLi.appendChild(ul);
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function statusBadge(hook) {
  const s = hook.status || '';
  const note = hook.note || '';
  let cls = 'status-' + s;
  let label = s.replace(/_/g, ' ');
  if (note) label += ' -- ' + note;
  if (!s && note) { cls = 'status-mvp'; label = note; }
  return s || note ? `<span class="status ${cls}">${esc(label)}</span>` : '';
}

function renderHooks(hooks) {
  const tree = document.getElementById('hooks-tree');
  for (const [name, hook] of Object.entries(hooks)) {
    const li = makeNode(name, 'hook', true,
      statusBadge(hook) + `<span class="count">[${hook.event_types.join(', ')}]</span>`);

    const children = [];

    // Entry
    children.push(makeNode(`entry: ${hook.entry}`, 'type', false));
    if (hook.matchers && hook.matchers.length)
      children.push(makeNode(`matchers: ${hook.matchers.join(', ')}`, 'type', false));
    children.push(makeNode(`pattern: ${hook.pattern}`, 'type', false));
    children.push(makeNode(`adapter: ${hook.adapter_method}`, 'adapter', false));

    // Helpers
    if (hook.adapter_helpers && hook.adapter_helpers.length) {
      const helpersLi = makeNode('adapter_helpers', 'adapter', true,
        `<span class="count">(${hook.adapter_helpers.length})</span>`);
      const helperItems = hook.adapter_helpers.map(h => {
        const hLi = makeNode(h.name, 'func', h.modules_called && h.modules_called.length > 0,
          `<span class="count"> -- ${h.description.substring(0, 60)}${h.description.length > 60 ? '...' : ''}</span>`);
        if (h.modules_called && h.modules_called.length) {
          const modItems = h.modules_called.map(m => {
            const label = m.module + (m.class ? `:${m.class}` : '') +
              (m.methods ? `.${m.methods.join(', ')}` : '') +
              (m.functions ? `:${m.functions.join(', ')}` : '') +
              (m.constants ? ` [${m.constants.join(', ')}]` : '');
            const mLi = makeNode(label, 'module', false);
            mLi.querySelector('.node').addEventListener('click', (e) => {
              e.stopPropagation();
              showModuleDetail(m.module);
            });
            return mLi;
          });
          addChildren(hLi, modItems);
        }
        return hLi;
      });
      addChildren(helpersLi, helperItems);
      children.push(helpersLi);
    }

    // Adapter calls
    if (hook.adapter_calls && hook.adapter_calls.length) {
      const callsLi = makeNode('adapter_calls', 'adapter', true,
        `<span class="count">(${hook.adapter_calls.length})</span>`);
      const callItems = hook.adapter_calls.map(c => {
        const cLi = makeNode(c.name, 'func', c.modules_called && c.modules_called.length > 0,
          `<span class="count"> -- ${c.description.substring(0, 60)}${c.description.length > 60 ? '...' : ''}</span>`);
        if (c.modules_called && c.modules_called.length) {
          const modItems = c.modules_called.map(m => {
            const label = m.module +
              (m.class ? `:${m.class}` : '') +
              (m.methods ? `.${m.methods.join(', ')}` : '') +
              (m.functions ? `:${m.functions.join(', ')}` : '');
            const mLi = makeNode(label, 'module', false);
            mLi.querySelector('.node').addEventListener('click', (e) => {
              e.stopPropagation();
              showModuleDetail(m.module);
            });
            return mLi;
          });
          addChildren(cLi, modItems);
        }
        return cLi;
      });
      addChildren(callsLi, callItems);
      children.push(callsLi);
    }

    // Entry point modules
    if (hook.entry_point_modules && hook.entry_point_modules.length) {
      const epLi = makeNode('entry_point_modules', 'type', true);
      const epItems = hook.entry_point_modules.map(m => {
        const label = m.module + (m.functions ? `:${m.functions.join(', ')}` : '');
        const mLi = makeNode(label, 'module', false);
        mLi.querySelector('.node').addEventListener('click', (e) => {
          e.stopPropagation();
          showModuleDetail(m.module);
        });
        return mLi;
      });
      addChildren(epLi, epItems);
      children.push(epLi);
    }

    // Flow
    if (hook.entry_point_flow) {
      const flowLi = makeNode('entry_point_flow', 'type', true);
      const flowItems = hook.entry_point_flow.map((step, i) =>
        makeNode(`${i + 1}. ${step}`, 'type', false));
      addChildren(flowLi, flowItems);
      children.push(flowLi);
    }

    // Data types
    if (hook.data_types) {
      const dtLi = makeNode('data_types', 'type', true);
      const dtItems = [];
      if (hook.data_types.input)
        dtItems.push(makeNode(`input: ${hook.data_types.input}`, 'type', false));
      if (hook.data_types.output)
        dtItems.push(makeNode(`output: ${hook.data_types.output}`, 'type', false));
      if (hook.data_types.internal)
        dtItems.push(makeNode(`internal: ${hook.data_types.internal.join(', ')}`, 'type', false));
      addChildren(dtLi, dtItems);
      children.push(dtLi);
    }

    addChildren(li, children);
    tree.appendChild(li);
  }
}

function renderModules(modules) {
  const tree = document.getElementById('modules-tree');
  for (const [path, mod] of Object.entries(modules)) {
    const li = makeNode(path, 'module', true);
    li.querySelector('.node').addEventListener('click', (e) => {
      e.stopPropagation();
      showModuleDetail(path);
      const ul = li.querySelector(':scope > ul');
      if (ul) {
        ul.classList.toggle('open');
        li.querySelector('.arrow').classList.toggle('open');
      }
    });

    const children = [];
    children.push(makeNode(mod.description, 'type', false));

    if (mod.class) children.push(makeNode(`class: ${mod.class}`, 'adapter', false));

    const allFuncs = [];
    if (mod.public_methods) allFuncs.push(...mod.public_methods.map(f => `${f}()`));
    if (mod.functions) allFuncs.push(...mod.functions.map(f => `${f}()`));
    if (mod.convenience_functions) allFuncs.push(...mod.convenience_functions.map(f => `${f}()`));
    if (mod.module_functions) allFuncs.push(...mod.module_functions.map(f => `${f}()`));

    if (allFuncs.length) {
      const fLi = makeNode('public API', 'func', true, `<span class="count">(${allFuncs.length})</span>`);
      addChildren(fLi, allFuncs.map(f => makeNode(f, 'func', false)));
      children.push(fLi);
    }

    if (mod.calls && mod.calls.length) {
      const cLi = makeNode('calls', 'module', true, `<span class="count">(${mod.calls.length})</span>`);
      addChildren(cLi, mod.calls.map(c => {
        const mLi = makeNode(c, 'module', false);
        const modPath = c.split(':')[0];
        mLi.querySelector('.node').addEventListener('click', (e) => {
          e.stopPropagation();
          showModuleDetail(modPath);
        });
        return mLi;
      }));
      children.push(cLi);
    }

    if (mod.called_by && mod.called_by.length) {
      const cbLi = makeNode('called_by', 'type', true, `<span class="count">(${mod.called_by.length})</span>`);
      addChildren(cbLi, mod.called_by.map(c => makeNode(c, 'type', false)));
      children.push(cbLi);
    }

    addChildren(li, children);
    tree.appendChild(li);
  }
}

function renderTypes(types) {
  const tree = document.getElementById('types-tree');
  for (const [name, t] of Object.entries(types)) {
    const extra = t.type ? `<span class="count">[${t.type}${t.frozen ? ', frozen' : ''}${t.module ? ` -- ${t.module}` : ''}]</span>` : '';
    const hasKids = (t.fields && t.fields.length) || (t.values && t.values.length) ||
                    (t.methods && t.methods.length) || (t.properties && t.properties.length);
    const li = makeNode(name, 'type', hasKids, extra);

    const children = [];
    if (t.fields) {
      const fLi = makeNode('fields', 'type', true, `<span class="count">(${t.fields.length})</span>`);
      addChildren(fLi, t.fields.map(f => makeNode(f, 'type', false)));
      children.push(fLi);
    }
    if (t.values) {
      const vLi = makeNode('values', 'type', true, `<span class="count">(${t.values.length})</span>`);
      addChildren(vLi, t.values.map(v => makeNode(v, 'type', false)));
      children.push(vLi);
    }
    if (t.methods) {
      const mLi = makeNode('methods', 'func', true);
      addChildren(mLi, t.methods.map(m => makeNode(m, 'func', false)));
      children.push(mLi);
    }
    if (t.properties) {
      const pLi = makeNode('properties', 'func', true);
      addChildren(pLi, t.properties.map(p => makeNode(p, 'func', false)));
      children.push(pLi);
    }
    if (t.priority_groups) {
      const pgLi = makeNode('priority_groups', 'type', true);
      addChildren(pgLi, Object.entries(t.priority_groups).map(([k, v]) =>
        makeNode(`${k}: ${v.join(', ')}`, 'type', false)));
      children.push(pgLi);
    }

    if (children.length) addChildren(li, children);
    tree.appendChild(li);
  }
}

function showModuleDetail(path) {
  if (!arch) return;
  const mod = arch.modules[path];
  if (!mod) return;

  const panel = document.getElementById('detail');
  const content = document.getElementById('detail-content');

  let html = `<h3>${esc(path)}</h3>`;
  html += `<p>${esc(mod.description)}</p>`;

  if (mod.class) html += `<div class="label">Class</div><p>${esc(mod.class)}</p>`;

  const sections = [
    ['Public Methods', mod.public_methods],
    ['Functions', mod.functions],
    ['Convenience Functions', mod.convenience_functions],
    ['Module Functions', mod.module_functions],
    ['Private Methods', mod.private_methods],
    ['Private Functions', mod.private_functions],
    ['Constants', mod.constants],
    ['Classes', mod.classes],
    ['Aliases', mod.aliases],
  ];

  sections.forEach(([label, items]) => {
    if (items && items.length) {
      html += `<div class="label">${label}</div><ul>`;
      items.forEach(i => { html += `<li>${esc(i)}</li>`; });
      html += '</ul>';
    }
  });

  if (mod.calls && mod.calls.length) {
    html += `<div class="label">Calls (${mod.calls.length})</div><ul>`;
    mod.calls.forEach(c => { html += `<li>${esc(c)}</li>`; });
    html += '</ul>';
  }

  if (mod.called_by && mod.called_by.length) {
    html += `<div class="label">Called By (${mod.called_by.length})</div><ul>`;
    mod.called_by.forEach(c => { html += `<li>${esc(c)}</li>`; });
    html += '</ul>';
  }

  content.innerHTML = html;
  panel.classList.add('open');
}

document.getElementById('detail-close').addEventListener('click', () => {
  document.getElementById('detail').classList.remove('open');
});
</script>
</body>
</html>
