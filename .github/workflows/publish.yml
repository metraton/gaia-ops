name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: npm ci

      - name: Build plugins
        run: npm run build:plugins

      - name: Verify build outputs
        run: |
          test -f dist/gaia-security/.claude-plugin/plugin.json
          test -f dist/gaia-security/hooks/hooks.json
          test -f dist/gaia-security/settings.json
          test -f dist/gaia-ops/.claude-plugin/plugin.json
          test -f dist/gaia-ops/hooks/hooks.json
          test -f dist/gaia-ops/settings.json
          echo "All plugin artifacts verified"

      - name: Commit built plugins
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist/
          if git diff --cached --quiet; then
            echo "No changes in dist/ — skipping commit"
          else
            git commit -m "build: generate plugin artifacts for ${{ github.event.release.tag_name }}"
            git push origin HEAD:main
            git tag -f ${{ github.event.release.tag_name }}
            git push origin ${{ github.event.release.tag_name }} --force
          fi

      - name: Run validation
        run: npm run pre-publish:validate

      - name: Clean build artifacts
        run: npm run clean

      - name: Determine npm tag
        id: npm-tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *"-rc."* ]]; then
            echo "tag=rc" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *"-beta."* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *"-alpha."* ]]; then
            echo "tag=alpha" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        run: npm publish --access public --tag ${{ steps.npm-tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Sandbox validation harness
        # End-to-end consumer-install verification. Installs the freshly
        # published version into an ephemeral sandbox populated from
        # tests/fixtures/sandbox-project/ and exercises install-time code
        # paths (postinstall merge, FTS5 backfill) plus read-side CLI
        # surface (version, doctor, status, context, memory stats/search,
        # scan, preservation checksum). 8 pass/fail checks.
        #
        # Waits briefly for npm registry propagation (eventual consistency)
        # before handing off to the harness. Harness exit code is the gate.
        run: |
          VERSION=$(node -p "require('./package.json').version")
          for i in 1 2 3 4 5 6; do
            if npm view "@jaguilar87/gaia@${VERSION}" version >/dev/null 2>&1; then
              echo "Version ${VERSION} visible on registry"
              break
            fi
            echo "Waiting for registry propagation (attempt ${i}/6)..."
            sleep 10
          done
          bash bin/validate-sandbox.sh --version "@jaguilar87/gaia@${VERSION}" --target sandbox

      - name: Notify success
        if: success()
        run: echo "Package published and smoke-installed successfully"
